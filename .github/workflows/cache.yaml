name: test-action
on:
  push:
    branches:
      - main
jobs:
  cache:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v20
      - uses: ItzEmoji/aeroflare@v1
        with:
          config: aeroflare-config.yaml
        env:
          NIX_SIGNING_KEY: ${{ secrets.NIX_SIGNING_KEY }}
